<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Minesweeper: Reboom</title>
<style>
  :root {
    --bg: #f6f7f9; --card: #ffffff; --text: #1c1c1e; --muted: #5c5c66;
    --accent: #3a6df0; --border: #e4e6ea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115; --card: #171a21; --text: #e7e9ee; --muted: #9aa0ac;
      --accent: #6f97ff; --border: #262b35;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh; display: grid; place-items: center; padding: 24px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 36px 30px; max-width: 460px; width: 100%; text-align: center;
  }
  h1 { font-size: 1.6rem; margin: 0 0 6px; letter-spacing: -0.01em; }
  p { color: var(--muted); margin: 0 0 24px; }
  .links { display: flex; flex-direction: column; gap: 12px; }
  a.btn {
    display: block; padding: 14px 18px; border-radius: 12px; text-decoration: none;
    background: var(--accent); color: #fff; font-weight: 600;
  }
  a.btn.secondary { background: transparent; color: var(--accent); border: 1px solid var(--border); }
  footer { color: var(--muted); font-size: 0.85rem; margin-top: 26px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Minesweeper: Reboom</h1>
    <p>Legal &amp; support documents</p>
    <div class="links">
      <a class="btn" href="./privacy/">Privacy Policy</a>
      <a class="btn secondary" href="./terms/">Terms of Service</a>
      <a class="btn secondary" href="mailto:minesweeper.reboom.support@gmail.com">Contact Support</a>
    </div>
    <footer>© 2026 Minesweeper: Reboom</footer>
  </div>
</body>
</html>
